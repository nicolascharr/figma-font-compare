<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: oklch(0.985 0.004 280);
    --bg-panel: oklch(0.962 0.006 280);
    --bg-hover: oklch(0.955 0.007 280);
    --border: oklch(0.908 0.007 280);
    --border-strong: oklch(0.84 0.01 280);
    --text: oklch(0.27 0.014 280);
    --text-dim: oklch(0.54 0.016 280);
    --text-faint: oklch(0.66 0.014 280);
    --accent: oklch(0.53 0.17 275);
    --accent-hover: oklch(0.47 0.18 275);
    --accent-soft: oklch(0.945 0.025 275);
    --accent-text: oklch(0.985 0.005 275);
    --ui-font: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --preview-fallback: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --preview-size: 36px;
  }
  .figma-dark {
    --bg: oklch(0.235 0.01 280);
    --bg-panel: oklch(0.265 0.011 280);
    --bg-hover: oklch(0.295 0.012 280);
    --border: oklch(0.33 0.012 280);
    --border-strong: oklch(0.42 0.014 280);
    --text: oklch(0.93 0.006 280);
    --text-dim: oklch(0.68 0.012 280);
    --text-faint: oklch(0.55 0.012 280);
    --accent: oklch(0.66 0.15 275);
    --accent-hover: oklch(0.72 0.14 275);
    --accent-soft: oklch(0.32 0.05 275);
    --accent-text: oklch(0.16 0.02 275);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: var(--ui-font);
    font-size: 11px;
    color: var(--text);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  button, input { font-family: inherit; font-size: inherit; color: inherit; }

  /* ── Top bar ─────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar input[type="text"] {
    flex: 1;
    height: 32px;
    padding: 0 10px;
    font-size: 13px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
    transition: border-color 150ms ease-out;
  }
  .topbar input[type="text"]:hover { border-color: var(--border-strong); }
  .topbar input[type="text"]:focus { border-color: var(--accent); }
  .topbar input[type="text"]::placeholder { color: var(--text-faint); }

  .size-control {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .size-control label { color: var(--text-dim); }
  .size-control input[type="range"] {
    width: 130px;
    accent-color: var(--accent);
  }
  .size-control output {
    width: 38px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--text-dim);
  }

  /* ── Main area: sidebar + list ───────────────────── */
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .sidebar {
    width: 168px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg-panel);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .sidebar input[type="search"] {
    width: 100%;
    height: 28px;
    padding: 0 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    outline: none;
    transition: border-color 150ms ease-out;
  }
  .sidebar input[type="search"]:focus { border-color: var(--accent); }
  .sidebar input[type="search"]::placeholder { color: var(--text-faint); }

  .filter-group h3 {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }
  .filter-group button {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 5px 8px;
    background: none;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    color: var(--text-dim);
    transition: background 150ms ease-out, color 150ms ease-out;
  }
  .filter-group button:hover { background: var(--bg-hover); color: var(--text); }
  .filter-group button.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }
  .filter-group button .count {
    font-variant-numeric: tabular-nums;
    font-weight: 400;
    color: var(--text-faint);
  }
  .filter-group button.active .count { color: var(--accent); }

  .collection-item { display: flex; align-items: center; gap: 2px; }
  .collection-item .col-btn { width: auto; flex: 1; min-width: 0; }
  .collection-item .col-btn .label {
    flex: 1;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-right: 8px;
  }
  .collection-item .col-del {
    width: auto;
    flex: 0 0 auto;
    padding: 4px 6px;
    visibility: hidden;
  }
  .collection-item:hover .col-del { visibility: visible; }
  .new-project { color: var(--text-faint); }
  .rename-input {
    width: 100%;
    height: 26px;
    padding: 0 8px;
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 5px;
    outline: none;
  }

  /* ── Preview list ────────────────────────────────── */
  .list-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .list-toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 7px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .toolbar-btn {
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 150ms ease-out;
  }
  .toolbar-btn:hover:not(:disabled) { color: var(--text); }
  .toolbar-btn:disabled {
    color: var(--text-faint);
    text-decoration: none;
    cursor: default;
  }

  .list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 150ms ease-out;
  }
  .row:hover { background: var(--bg-hover); }
  .row.checked { background: var(--accent-soft); }

  .row input[type="checkbox"] {
    margin-top: 2px;
    width: 14px;
    height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .row .content { flex: 1; min-width: 0; }
  .row .meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }
  .row .meta .name { font-weight: 600; font-size: 11px; }
  .row .meta .styles { color: var(--text-faint); }
  .row .meta .badge {
    font-size: 9px;
    padding: 1px 5px;
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    color: var(--text-dim);
  }
  .row .preview {
    font-size: var(--preview-size);
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .row .star,
  .row .remove {
    margin-top: 1px;
    padding: 2px 4px;
    background: none;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    color: var(--text-faint);
    visibility: hidden;
    flex-shrink: 0;
  }
  .row:hover .star, .row:hover .remove { visibility: visible; }
  .row .star:hover { color: oklch(0.68 0.15 85); }
  .row .star.starred { visibility: visible; color: oklch(0.72 0.14 85); }
  .row .remove:hover { color: var(--text); background: var(--bg-hover); }
  .row.unavailable { opacity: 0.55; }

  /* Loading skeletons */
  .skeleton {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .skeleton .bar {
    height: 10px;
    width: 110px;
    border-radius: 4px;
    background: var(--bg-panel);
    margin-bottom: 12px;
  }
  .skeleton .bar.big {
    height: 26px;
    width: 60%;
    margin-bottom: 0;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.45; } }

  .empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-dim);
  }
  .empty button {
    margin-top: 10px;
    padding: 5px 12px;
    background: none;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    cursor: pointer;
    color: var(--text);
  }
  .empty button:hover { background: var(--bg-hover); }

  .sentinel { height: 1px; }

  /* ── Footer ──────────────────────────────────────── */
  footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  footer .summary { flex: 1; color: var(--text-dim); }

  #addBtn {
    height: 32px;
    padding: 0 16px;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: background 150ms ease-out;
  }
  #addBtn:hover:not(:disabled) { background: var(--accent-hover); }
  #addBtn:disabled { opacity: 0.45; cursor: default; }

  .collect-wrap { position: relative; }
  #collectBtn {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 32px;
    padding: 0 12px;
    background: none;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    transition: background 150ms ease-out;
  }
  #collectBtn:hover:not(:disabled) { background: var(--bg-hover); }
  #collectBtn:disabled { opacity: 0.45; cursor: default; }
  #collectBtn .chev { font-size: 11px; color: var(--text-dim); }

  .menu {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    min-width: 230px;
    padding: 4px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    box-shadow: 0 4px 16px oklch(0.2 0.02 280 / 0.18);
    z-index: 10;
  }
  .menu .item {
    display: block;
    width: 100%;
    padding: 6px 8px;
    text-align: left;
    background: none;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menu .item:hover { background: var(--bg-hover); }
  .menu .divider { height: 1px; margin: 4px 0; background: var(--border); }
  .menu .new-form { display: flex; gap: 6px; padding: 4px; }
  .menu .new-form input {
    flex: 1;
    height: 28px;
    padding: 0 8px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    outline: none;
  }
  .menu .new-form input:focus { border-color: var(--accent); }
  .menu .new-form button {
    height: 28px;
    padding: 0 10px;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 5px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

  <header class="topbar">
    <input type="text" id="sampleInput" placeholder="Type your text or brand name…" spellcheck="false">
    <div class="size-control">
      <label for="sizeSlider">Size</label>
      <input type="range" id="sizeSlider" min="12" max="96" step="1" value="36">
      <output id="sizeValue">36 px</output>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <input type="search" id="searchInput" placeholder="Search fonts…">

      <div class="filter-group" id="categoryGroup">
        <h3>Categories</h3>
        <button data-category="all" class="active">All <span class="count"></span></button>
        <button data-category="sans">Sans Serif <span class="count"></span></button>
        <button data-category="serif">Serif <span class="count"></span></button>
        <button data-category="mono">Monospace <span class="count"></span></button>
        <button data-category="display">Display &amp; Script <span class="count"></span></button>
      </div>

      <div class="filter-group" id="sourceGroup">
        <h3>Source</h3>
        <button data-source="all" class="active">All <span class="count"></span></button>
        <button data-source="google">Figma Cloud <span class="count"></span></button>
        <button data-source="system">System <span class="count"></span></button>
      </div>

      <div class="filter-group" id="collectionGroup">
        <h3>Collections</h3>
        <div id="collectionList"></div>
        <button id="newProjectBtn" class="new-project">+ New project</button>
      </div>
    </aside>

    <section class="list-pane">
      <div class="list-toolbar">
        <button class="toolbar-btn" id="clearBtn" disabled>Deselect all</button>
      </div>
      <div class="list" id="list" aria-label="Font previews"></div>
    </section>
  </main>

  <footer>
    <span class="summary" id="summary">Loading fonts…</span>
    <div class="collect-wrap">
      <button id="collectBtn" disabled>Add to collection <span class="chev">▾</span></button>
      <div class="menu" id="collectMenu" hidden></div>
    </div>
    <button id="addBtn" disabled>Add to Canvas</button>
  </footer>

<script>
'use strict';

/* ════════════════════════════════════════════════════
   Heuristic font classification.
   The Figma API provides no category, so families are
   classified by keywords in their name.
   ════════════════════════════════════════════════════ */

const MONO_KEYWORDS = [
  'mono', 'code', 'courier', 'consol', 'menlo', 'typewriter', 'terminal',
  'inconsolata', 'fixed', 'jetbrains', 'hack', 'fira code', 'space grotesk mono',
  'andale', 'letter gothic', 'ocr', 'vt323', 'press start', 'monaco'
];

const SERIF_KEYWORDS = [
  'times', 'georgia', 'garamond', 'baskerville', 'bodoni', 'didot', 'caslon',
  'palatino', 'antiqua', 'cambria', 'charter', 'clarendon', 'rockwell',
  'playfair', 'merriweather', 'lora', 'crimson', 'cormorant', 'spectral',
  'literata', 'slab', 'zilla', 'bitter', 'domine', 'vollkorn', 'alegreya',
  'cardo', 'neuton', 'arvo', 'frank ruhl', 'old standard', 'prata', 'hoefler',
  'minion', 'sabon', 'jenson', 'utopia', 'freight', 'tinos', 'gelasio',
  'newsreader', 'fraunces', 'libre baskerville', 'noticia', 'petrona'
];

const DISPLAY_KEYWORDS = [
  'script', 'hand', 'brush', 'comic', 'display', 'decorative', 'marker',
  'chalk', 'graffiti', 'caveat', 'pacifico', 'lobster', 'dancing', 'satisfy',
  'sacramento', 'great vibes', 'cookie', 'courgette', 'kalam', 'indie flower',
  'shadows into light', 'amatic', 'bangers', 'fredoka', 'righteous', 'abril',
  'alfa slab', 'bungee', 'monoton', 'creepster', 'papyrus', 'impact',
  'cursive', 'calligra', 'signature', 'tangerine', 'yellowtail', 'allura',
  'parisienne', 'permanent marker', 'rock salt', 'homemade', 'patrick hand',
  'gloria', 'luckiest', 'chewy', 'sigmar', 'titan one', 'rubik mono'
];

function classify(family) {
  const f = family.toLowerCase();
  if (MONO_KEYWORDS.some(k => f.includes(k))) return 'mono';
  if (DISPLAY_KEYWORDS.some(k => f.includes(k))) return 'display';
  if (f.includes('serif') && !f.includes('sans')) return 'serif';
  if (f.includes('sans')) return 'sans';
  if (SERIF_KEYWORDS.some(k => f.includes(k))) return 'serif';
  return 'sans';
}

/* ════════════════════════════════════════════════════
   Cloud font previews.
   Families returned by Figma but not installed on this
   machine (Figma cloud fonts — essentially the Google
   Fonts library) are fetched on demand from the Google
   Fonts CSS API when their row becomes visible, and
   registered under the exact Figma family name so the
   preview matches what lands on the canvas.
   ════════════════════════════════════════════════════ */

/* Local availability detection: a family that renders with the same
   metrics as every generic fallback is not installed locally. */
const measureCtx = document.createElement('canvas').getContext('2d');
const MEASURE_SAMPLE = 'mmmmmmmmmmlliWQ@#69';
const baseWidths = {};
for (const generic of ['monospace', 'serif', 'sans-serif']) {
  measureCtx.font = '72px ' + generic;
  baseWidths[generic] = measureCtx.measureText(MEASURE_SAMPLE).width;
}
function isLocallyAvailable(family) {
  const quoted = '"' + family.replace(/"/g, '') + '"';
  for (const generic of ['monospace', 'serif', 'sans-serif']) {
    measureCtx.font = '72px ' + quoted + ', ' + generic;
    if (measureCtx.measureText(MEASURE_SAMPLE).width !== baseWidths[generic]) return true;
  }
  return false;
}

/* Figma exposes weight variants as separate families ("Abhaya Libre
   ExtraBold") while Google Fonts expects the base family plus a weight
   axis ("Abhaya Libre" + wght@800). */
const GF_WEIGHT_SUFFIXES = {
  Thin: 100, Hairline: 100, ExtraLight: 200, UltraLight: 200, Light: 300,
  Regular: 400, Medium: 500, SemiBold: 600, DemiBold: 600, Bold: 700,
  ExtraBold: 800, UltraBold: 800, Black: 900, Heavy: 900
};

function googleFontsUrl(family, withAxes) {
  let base = family;
  let italic = false;
  let weight = null;
  if (withAxes) {
    if (base.endsWith(' Italic')) { italic = true; base = base.slice(0, -7); }
    for (const suffix in GF_WEIGHT_SUFFIXES) {
      if (base.endsWith(' ' + suffix)) {
        weight = GF_WEIGHT_SUFFIXES[suffix];
        base = base.slice(0, -(suffix.length + 1));
        break;
      }
    }
  }
  let spec = '';
  if (italic && weight) spec = ':ital,wght@1,' + weight;
  else if (italic) spec = ':ital@1';
  else if (weight) spec = ':wght@' + weight;
  const encoded = encodeURIComponent(base).replace(/%20/g, '+');
  return 'https://fonts.googleapis.com/css2?family=' + encoded + spec + '&display=swap';
}

async function fetchCss(url) {
  try {
    const response = await fetch(url);
    return response.ok ? await response.text() : null;
  } catch (e) {
    return null;
  }
}

const requestedPreviews = new Set();
const failedPreviews = new Set();

async function loadCloudPreview(family) {
  if (requestedPreviews.has(family)) return;
  requestedPreviews.add(family);

  // Unknown families make the whole request fail, so one request per
  // family: first with the weight/italic axes, then the plain family.
  let css = await fetchCss(googleFontsUrl(family, true));
  if (css === null) css = await fetchCss(googleFontsUrl(family, false));
  if (css === null) {
    failedPreviews.add(family);
    markApproximatePreview(family);
    return;
  }

  // Alias every @font-face onto the exact Figma family name, with
  // neutral weight/style so the preview element always matches it.
  const escaped = family.replace(/'/g, "\\'");
  const aliased = css
    .replace(/font-family:\s*'[^']*'/g, "font-family: '" + escaped + "'")
    .replace(/font-weight:\s*[^;]+;/g, 'font-weight: normal;')
    .replace(/font-style:\s*italic;/g, 'font-style: normal;');
  const style = document.createElement('style');
  style.textContent = aliased;
  document.head.appendChild(style);
}

function markApproximatePreview(family) {
  document.querySelectorAll('.row').forEach(row => {
    if (row.dataset.family === family && !row.querySelector('.badge.approx')) {
      const badge = document.createElement('span');
      badge.className = 'badge approx';
      badge.textContent = 'Approximate preview';
      row.querySelector('.meta').appendChild(badge);
    }
  });
}

/* ════════════════════════════════════════════════════
   Application state
   ════════════════════════════════════════════════════ */

const BATCH_SIZE = 50;

const state = {
  allFamilies: [],          // [{ family, styles, category, isGoogle }]
  filtered: [],
  renderedCount: 0,
  selected: new Map(),      // family -> default style
  query: '',
  category: 'all',
  source: 'all',
  sampleText: '',
  fontSize: 36,
  creating: false,
  availableSet: new Set(),
  collection: null,         // id of the active collection (filter), or null
  collections: [{ id: 'favorites', name: 'Favorites', fonts: [] }]
};

const listEl = document.getElementById('list');
const sampleInput = document.getElementById('sampleInput');
const searchInput = document.getElementById('searchInput');
const sizeSlider = document.getElementById('sizeSlider');
const sizeValue = document.getElementById('sizeValue');
const summaryEl = document.getElementById('summary');
const clearBtn = document.getElementById('clearBtn');
const addBtn = document.getElementById('addBtn');
const collectBtn = document.getElementById('collectBtn');
const collectMenu = document.getElementById('collectMenu');
const collectionList = document.getElementById('collectionList');
const newProjectBtn = document.getElementById('newProjectBtn');

/* Default style of a family: Regular when present, otherwise the closest match. */
function pickDefaultStyle(styles) {
  const preferred = ['regular', 'normal', 'book', 'roman', 'medium', '400'];
  for (const p of preferred) {
    const hit = styles.find(s => s.toLowerCase() === p);
    if (hit) return hit;
  }
  return styles[0];
}

/* ════════════════════════════════════════════════════
   Collections: "Favorites" is a pinned default
   collection; projects are named collections.
   Persisted through figma.clientStorage on the sandbox
   side (save-collections / collections messages).
   ════════════════════════════════════════════════════ */

function favorites() {
  return state.collections[0];
}

function activeCollection() {
  if (!state.collection) return null;
  return state.collections.find(c => c.id === state.collection) || null;
}

function isFavorite(family) {
  return favorites().fonts.some(f => f.family === family);
}

function persistCollections() {
  parent.postMessage({ pluginMessage: { type: 'save-collections', collections: state.collections } }, '*');
}

function toggleFavorite(entry) {
  const fav = favorites();
  const i = fav.fonts.findIndex(f => f.family === entry.family);
  if (i >= 0) fav.fonts.splice(i, 1);
  else fav.fonts.push({ family: entry.family, style: pickDefaultStyle(entry.styles) });
  persistCollections();
  renderCollections();
}

function createProject(name, fonts) {
  const project = {
    id: 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    name,
    fonts
  };
  state.collections.push(project);
  persistCollections();
  renderCollections();
  return project;
}

function addSelectionTo(col) {
  let added = 0;
  state.selected.forEach((style, family) => {
    if (!col.fonts.some(f => f.family === family)) {
      col.fonts.push({ family, style });
      added++;
    }
  });
  persistCollections();
  renderCollections();
  if (state.collection) applyFilters();
  flashSummary(added + ' font' + (added > 1 ? 's' : '') + ' added to “' + col.name + '”');
}

let summaryTimer = null;
function flashSummary(text) {
  summaryEl.textContent = text;
  clearTimeout(summaryTimer);
  summaryTimer = setTimeout(updateSummary, 2500);
}

/* ── Skeletons during the initial load ── */
function showSkeletons() {
  listEl.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const sk = document.createElement('div');
    sk.className = 'skeleton';
    sk.innerHTML = '<div class="bar"></div><div class="bar big"></div>';
    listEl.appendChild(sk);
  }
}

/* ── Filtering ── */
function applyFilters() {
  const q = state.query.trim().toLowerCase();
  const col = activeCollection();
  const colFamilies = col ? new Set(col.fonts.map(f => f.family)) : null;

  state.filtered = state.allFamilies.filter(f => {
    if (colFamilies && !colFamilies.has(f.family)) return false;
    if (q && !f.family.toLowerCase().includes(q)) return false;
    if (state.category !== 'all' && f.category !== state.category) return false;
    if (state.source === 'google' && !f.isGoogle) return false;
    if (state.source === 'system' && f.isGoogle) return false;
    return true;
  });

  // Collection fonts missing from this machine are shown grayed out.
  if (col) {
    for (const f of col.fonts) {
      if (!state.availableSet.has(f.family) && (!q || f.family.toLowerCase().includes(q))) {
        state.filtered.push({ family: f.family, styles: [f.style], category: 'sans', isGoogle: false, unavailable: true });
      }
    }
  }

  renderFromScratch();
  updateSummary();
}

/* ── Batched rendering (lazy loading on scroll) ── */
let sentinel = null;
const sentinelObserver = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) renderNextBatch();
}, { root: listEl, rootMargin: '400px' });

const visibilityObserver = new IntersectionObserver(entries => {
  for (const entry of entries) {
    if (entry.isIntersecting) {
      if (entry.target.dataset.cloud === '1') loadCloudPreview(entry.target.dataset.family);
      visibilityObserver.unobserve(entry.target);
    }
  }
}, { root: listEl, rootMargin: '200px' });

function renderFromScratch() {
  sentinelObserver.disconnect();
  visibilityObserver.disconnect();
  listEl.innerHTML = '';
  state.renderedCount = 0;
  listEl.scrollTop = 0;

  if (state.filtered.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    const p = document.createElement('p');
    const col = activeCollection();
    p.textContent = col && col.fonts.length === 0
      ? '“' + col.name + '” is empty: check some fonts then use “Add to collection”, or click the star on a row.'
      : 'No fonts match these filters.';
    empty.appendChild(p);
    const reset = document.createElement('button');
    reset.textContent = 'Reset filters';
    reset.addEventListener('click', resetFilters);
    empty.appendChild(reset);
    listEl.appendChild(empty);
    return;
  }

  sentinel = document.createElement('div');
  sentinel.className = 'sentinel';
  listEl.appendChild(sentinel);
  renderNextBatch();
  sentinelObserver.observe(sentinel);
}

function renderNextBatch() {
  const next = state.filtered.slice(state.renderedCount, state.renderedCount + BATCH_SIZE);
  if (next.length === 0) return;

  const fragment = document.createDocumentFragment();
  for (const entry of next) fragment.appendChild(buildRow(entry));
  listEl.insertBefore(fragment, sentinel);
  state.renderedCount += next.length;
}

function buildRow(entry) {
  const row = document.createElement('label');
  row.className = 'row';
  row.dataset.family = entry.family;
  row.dataset.cloud = entry.isGoogle || entry.unavailable ? '1' : '0';
  if (state.selected.has(entry.family)) row.classList.add('checked');

  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = state.selected.has(entry.family);
  checkbox.disabled = !!entry.unavailable;
  checkbox.addEventListener('change', () => {
    if (checkbox.checked) {
      state.selected.set(entry.family, pickDefaultStyle(entry.styles));
      row.classList.add('checked');
    } else {
      state.selected.delete(entry.family);
      row.classList.remove('checked');
    }
    updateSummary();
  });

  const content = document.createElement('div');
  content.className = 'content';

  const meta = document.createElement('div');
  meta.className = 'meta';

  const name = document.createElement('span');
  name.className = 'name';
  name.textContent = entry.family;
  meta.appendChild(name);

  const styles = document.createElement('span');
  styles.className = 'styles';
  styles.textContent = entry.styles.length + ' style' + (entry.styles.length > 1 ? 's' : '');
  meta.appendChild(styles);

  if (entry.isGoogle) {
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = 'Cloud';
    meta.appendChild(badge);
  }

  if (entry.unavailable) {
    row.classList.add('unavailable');
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = 'Not available on this machine';
    meta.appendChild(badge);
  }

  if (failedPreviews.has(entry.family)) {
    const badge = document.createElement('span');
    badge.className = 'badge approx';
    badge.textContent = 'Approximate preview';
    meta.appendChild(badge);
  }

  const preview = document.createElement('div');
  preview.className = 'preview';
  preview.style.fontFamily = "'" + entry.family.replace(/'/g, "\\'") + "', var(--preview-fallback)";
  preview.textContent = state.sampleText || entry.family;

  content.appendChild(meta);
  content.appendChild(preview);
  row.appendChild(checkbox);
  row.appendChild(content);

  if (entry.unavailable) {
    const remove = document.createElement('button');
    remove.type = 'button';
    remove.className = 'remove';
    remove.textContent = '✕';
    remove.title = 'Remove from collection';
    remove.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const col = activeCollection();
      if (!col) return;
      col.fonts = col.fonts.filter(f => f.family !== entry.family);
      persistCollections();
      renderCollections();
      applyFilters();
    });
    row.appendChild(remove);
  } else {
    const star = document.createElement('button');
    star.type = 'button';
    star.title = 'Favorite';
    const syncStar = () => {
      const fav = isFavorite(entry.family);
      star.className = 'star' + (fav ? ' starred' : '');
      star.textContent = fav ? '★' : '☆';
    };
    syncStar();
    star.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      toggleFavorite(entry);
      syncStar();
      if (state.collection === 'favorites') applyFilters();
    });
    row.appendChild(star);
  }

  visibilityObserver.observe(row);
  return row;
}

/* ── Footer ── */
function updateSummary() {
  const n = state.selected.size;
  summaryEl.textContent = state.filtered.length + ' font' + (state.filtered.length > 1 ? 's' : '')
    + (n > 0 ? ' · ' + n + ' selected' : '');
  clearBtn.disabled = n === 0;
  collectBtn.disabled = n === 0;
  addBtn.disabled = n === 0 || state.creating;
  addBtn.textContent = n === 0
    ? 'Add to Canvas'
    : 'Add the ' + n + ' selected fonts to Canvas';
  if (n === 1) addBtn.textContent = 'Add the selected font to Canvas';
}

function resetFilters() {
  state.query = '';
  state.category = 'all';
  state.source = 'all';
  state.collection = null;
  searchInput.value = '';
  syncFilterButtons();
  renderCollections();
  applyFilters();
}

/* ── Filter buttons and counters ── */
function syncFilterButtons() {
  document.querySelectorAll('#categoryGroup button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.category === state.category);
  });
  document.querySelectorAll('#sourceGroup button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.source === state.source);
  });
}

function updateFilterCounts() {
  const counts = { all: state.allFamilies.length, sans: 0, serif: 0, mono: 0, display: 0, google: 0, system: 0 };
  for (const f of state.allFamilies) {
    counts[f.category]++;
    counts[f.isGoogle ? 'google' : 'system']++;
  }
  document.querySelectorAll('#categoryGroup button').forEach(btn => {
    btn.querySelector('.count').textContent = counts[btn.dataset.category];
  });
  document.querySelectorAll('#sourceGroup button').forEach(btn => {
    const key = btn.dataset.source === 'all' ? 'all' : btn.dataset.source;
    btn.querySelector('.count').textContent = counts[key];
  });
}

/* ── Sidebar: collections rendering ── */
function renderCollections() {
  collectionList.innerHTML = '';
  for (const col of state.collections) {
    const item = document.createElement('div');
    item.className = 'collection-item';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'col-btn' + (state.collection === col.id ? ' active' : '');
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = (col.id === 'favorites' ? '★ ' : '') + col.name;
    const count = document.createElement('span');
    count.className = 'count';
    count.textContent = col.fonts.length;
    btn.appendChild(label);
    btn.appendChild(count);
    btn.addEventListener('click', () => {
      state.collection = state.collection === col.id ? null : col.id;
      renderCollections();
      applyFilters();
    });
    item.appendChild(btn);

    if (col.id !== 'favorites') {
      btn.title = 'Double-click to rename';
      btn.addEventListener('dblclick', () => startRename(col, item));
      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'col-del';
      del.title = 'Delete project';
      del.textContent = '✕';
      del.addEventListener('click', () => {
        state.collections = state.collections.filter(c => c.id !== col.id);
        if (state.collection === col.id) state.collection = null;
        persistCollections();
        renderCollections();
        applyFilters();
        flashSummary('Project “' + col.name + '” deleted');
      });
      item.appendChild(del);
    }
    collectionList.appendChild(item);
  }
}

function startRename(col, item) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'rename-input';
  input.value = col.name;
  item.replaceChildren(input);
  input.focus();
  input.select();
  const commit = () => {
    const name = input.value.trim();
    if (name) col.name = name;
    persistCollections();
    renderCollections();
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') {
      input.removeEventListener('blur', commit);
      renderCollections();
    }
  });
}

newProjectBtn.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'rename-input';
  input.placeholder = 'Project name…';
  newProjectBtn.replaceWith(input);
  input.focus();
  input.addEventListener('blur', () => {
    const name = input.value.trim();
    if (name) createProject(name, []);
    input.replaceWith(newProjectBtn);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { input.value = ''; input.blur(); }
  });
});

/* ── "Add to collection" menu ── */
function menuItem(label, onClick) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'item';
  btn.textContent = label;
  btn.addEventListener('click', onClick);
  return btn;
}

function buildCollectMenu() {
  collectMenu.innerHTML = '';
  collectMenu.appendChild(menuItem('★ Add to favorites', () => {
    addSelectionTo(favorites());
    closeCollectMenu();
  }));

  const projects = state.collections.slice(1);
  if (projects.length > 0) {
    const divider = document.createElement('div');
    divider.className = 'divider';
    collectMenu.appendChild(divider);
    for (const p of projects) {
      collectMenu.appendChild(menuItem('Add to “' + p.name + '”', () => {
        addSelectionTo(p);
        closeCollectMenu();
      }));
    }
  }

  const divider = document.createElement('div');
  divider.className = 'divider';
  collectMenu.appendChild(divider);
  collectMenu.appendChild(menuItem('+ New project…', showNewProjectForm));
}

// Inline name field inside the menu: no modal just to type one word.
function showNewProjectForm() {
  const form = document.createElement('div');
  form.className = 'new-form';
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Project name (client, brand…)';
  const create = document.createElement('button');
  create.type = 'button';
  create.textContent = 'Create';
  const submit = () => {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const fonts = [];
    state.selected.forEach((style, family) => fonts.push({ family, style }));
    const project = createProject(name, fonts);
    closeCollectMenu();
    flashSummary(fonts.length + ' font' + (fonts.length > 1 ? 's' : '') + ' → new project “' + project.name + '”');
  };
  create.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  form.appendChild(input);
  form.appendChild(create);
  collectMenu.replaceChild(form, collectMenu.lastElementChild);
  input.focus();
}

function closeCollectMenu() { collectMenu.hidden = true; }

collectBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (collectMenu.hidden) {
    buildCollectMenu();
    collectMenu.hidden = false;
  } else {
    closeCollectMenu();
  }
});
collectMenu.addEventListener('click', e => e.stopPropagation());
document.addEventListener('click', closeCollectMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCollectMenu(); });

/* ════════════════════════════════════════════════════
   Events
   ════════════════════════════════════════════════════ */

sampleInput.addEventListener('input', () => {
  state.sampleText = sampleInput.value;
  document.querySelectorAll('.row').forEach(row => {
    row.querySelector('.preview').textContent = state.sampleText || row.dataset.family;
  });
});

sizeSlider.addEventListener('input', () => {
  state.fontSize = Number(sizeSlider.value);
  sizeValue.textContent = state.fontSize + ' px';
  document.documentElement.style.setProperty('--preview-size', state.fontSize + 'px');
});

let searchDebounce = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.query = searchInput.value;
    applyFilters();
  }, 120);
});

document.getElementById('categoryGroup').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  state.category = btn.dataset.category;
  syncFilterButtons();
  applyFilters();
});

document.getElementById('sourceGroup').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  state.source = btn.dataset.source;
  syncFilterButtons();
  applyFilters();
});

clearBtn.addEventListener('click', () => {
  state.selected.clear();
  document.querySelectorAll('.row.checked').forEach(row => {
    row.classList.remove('checked');
    row.querySelector('input[type="checkbox"]').checked = false;
  });
  updateSummary();
});

addBtn.addEventListener('click', () => {
  if (state.selected.size === 0 || state.creating) return;
  state.creating = true;
  addBtn.disabled = true;
  addBtn.textContent = 'Adding…';
  const fonts = [];
  state.selected.forEach((style, family) => fonts.push({ family, style }));
  parent.postMessage({
    pluginMessage: {
      type: 'create-nodes',
      text: state.sampleText.trim(),
      fontSize: state.fontSize,
      fonts
    }
  }, '*');
});

/* ── Messages from the backend (code.ts) ── */
window.onmessage = event => {
  const msg = event.data.pluginMessage;
  if (!msg) return;

  if (msg.type === 'fonts') {
    // "Cloud" means: returned by Figma but not installed on this machine.
    state.allFamilies = msg.families.map(f => ({
      family: f.family,
      styles: f.styles,
      category: classify(f.family),
      isGoogle: !isLocallyAvailable(f.family)
    }));
    state.availableSet = new Set(state.allFamilies.map(f => f.family));
    updateFilterCounts();
    applyFilters();
    return;
  }

  if (msg.type === 'collections') {
    if (Array.isArray(msg.collections) && msg.collections.length > 0) {
      state.collections = msg.collections;
      // The pinned default collection keeps its UI name even if stored data
      // was saved under another locale.
      state.collections[0].name = 'Favorites';
    }
    renderCollections();
    if (state.allFamilies.length > 0) applyFilters();
    return;
  }

  if (msg.type === 'progress') {
    addBtn.textContent = 'Adding… ' + msg.done + '/' + msg.total;
    return;
  }

  if (msg.type === 'create-done') {
    state.creating = false;
    updateSummary();
  }
};

/* ── Startup ── */
showSkeletons();
renderCollections();
parent.postMessage({ pluginMessage: { type: 'init' } }, '*');
</script>
</body>
